name: Binary Packages
on:
  push:
    branches:
      - master
    paths-ignore:
      - 'doc/**'
      - 'docs/**'
      - '.readthedocs.yaml'
      - 'config/scripts/gh-pages/**'
      - 'config/editor/**'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'COPYING'
      - '**/*.md'

concurrency:
  group: packages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Windows:
    runs-on: ${{ matrix.cfg.os }}
    name: ${{ matrix.cfg.name }}
    timeout-minutes: 60
    strategy:
      matrix:
        cfg:
        -  { os: windows-2022,  name: 'Windows_64-bit',  opt: '--disable-iconc' }
        #-  { os: windows-latest,  name: 'Windows_32-bit', opt: '--build=i686-w64-mingw32 --host=i686-w64-mingw32' }

    defaults:
      run:
        shell: msys2 {0}

    steps:
    - uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: >-
          mingw-w64-ucrt-x86_64-gcc
          mingw-w64-ucrt-x86_64-diffutils
          mingw-w64-ucrt-x86_64-openssl
          mingw-w64-ucrt-x86_64-libpng
          mingw-w64-ucrt-x86_64-libjpeg-turbo
          make
          git

    - run: git config --global core.autocrlf input
      shell: bash

    - name: Checkout
      uses: actions/checkout@v6

    - name: Configure
      run: sh configure  ${{ matrix.cfg.opt }}

    - name: Make
      run: make

    - name: Installer
      run: |
        make WinInstaller

    - name: Publish
      uses: actions/upload-artifact@v6
      with:
        name: unicon-${{ matrix.cfg.name }}
        path: Output/setup-unicon*.exe
        if-no-files-found: warn

  Ubuntu:
    runs-on: ${{ matrix.cfg.os }}
    name: ${{ matrix.cfg.name }}
    timeout-minutes: 60
    strategy:
      matrix:
        cfg:
        -  { os: ubuntu-24.04,  name: 'Ubuntu-24.04_amd64',   opt: '' }
        -  { os: ubuntu-22.04,  name: 'Ubuntu-22.04_amd64',   opt: '' }
        #-  { os: ubuntu-20.04, name: 'Ubuntu-20.04_x86',  opt: '--host=i686-pc-linux-gnu' }

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Cache apt packages
      uses: actions/cache@v5
      with:
        path: /var/cache/apt/archives/*.deb
        key: apt-packages-${{ matrix.cfg.os }}-${{ hashFiles('debian/control') }}
        restore-keys: apt-packages-${{ matrix.cfg.os }}-

    - name: Install dependencies
      run: |
        sudo apt-get update
        #sudo apt-get install -y gcc-multilib g++-multilib
        sudo apt-get install -y build-essential fakeroot devscripts equivs dh-autoreconf
        sudo mk-build-deps --install debian/control

    - name: Configure
      run: ./configure ${{ matrix.cfg.opt }}

    - name: Deb
      run: |
        make debin
        mkdir debian-pkg
        cp ../unicondist/unicon_*.deb debian-pkg/
        cp ../unicondist/unicon_*.changes debian-pkg/
        cp ../unicondist/unicon_*.dsc debian-pkg/
        cp ../unicondist/unicon_*.debian.tar.xz debian-pkg/
        cp ../unicondist/unicon_*.orig.tar.gz debian-pkg/

    - name: Publish
      uses: actions/upload-artifact@v6
      with:
        name: unicon-${{ matrix.cfg.name }}
        path: debian-pkg/unicon_*
        if-no-files-found: warn

    - name: Install
      run: |
        shopt -s nullglob
        debs=(./debian-pkg/*.deb)
        if [ "${#debs[@]}" -eq 0 ]; then
          echo "No .deb packages under debian-pkg/; did the Deb step succeed?"
          exit 1
        fi
        sudo apt install -y "${debs[@]}"

    - name: Test
      run: make Test
      env:
        UC: unicon
