# https://docs.readthedocs.io/en/stable/config-file/v2.html
# HTML via Pandoc — same entrypoint as GitHub Pages (config/scripts/gh-pages/build-gh-pages-site.sh).

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  apt_packages:
    - pandoc
  jobs:
    build:
      html:
        - bash config/scripts/gh-pages/build-gh-pages-site.sh "$READTHEDOCS_OUTPUT/html"
