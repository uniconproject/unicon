# GitHub Pages (single _site/ artifact); built by config/scripts/gh-pages/build-gh-pages-site.sh:
#   Shared nav + CSS under config/scripts/gh-pages/; assets at /unicon/assets/site.css
#   README.md → index.html; doc/** mirrored; doc/README.md → doc/index.html
#   CONTRIBUTING / COPYING → .md + .html; config/editor/**; doc/book, doc/icon, doc/ib indexes
#   Link pass: internal .md/COPYING/README paths → /unicon/… HTML routes
#
# Pages must use THIS workflow (pandoc + nav). If Settings → Pages → Build: Deployment
# source is a branch instead of "GitHub Actions", GitHub serves Jekyll-rendered README
# (no top nav, theme style.css). Fix: Settings → Pages → set Source to GitHub Actions.
# https://docs.github.com/en/pages/getting-started-with-github-pages/configuring-a-publishing-source-for-your-github-pages-site
#
# Pull requests run build only (no deploy) so you can verify before merge.

name: Pages

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'COPYING'
      - 'doc/**'
      - 'config/editor/**'
      - 'config/scripts/gh-pages/**'
      - '.github/workflows/pages.yml'
  pull_request:
    paths:
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'COPYING'
      - 'doc/**'
      - 'config/editor/**'
      - 'config/scripts/gh-pages/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.repository == 'uniconproject/unicon'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Build site
        run: bash config/scripts/gh-pages/build-gh-pages-site.sh _site

      - name: Upload site artifact (for deploy job)
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: _site
          retention-days: 3

  deploy:
    if: github.repository == 'uniconproject/unicon' && github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: site
          path: _site

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
