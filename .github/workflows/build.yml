name: Build

# Controls when the action will run.
on:
# Triggers the workflow on push or pull request events for the specified branches.
  push:
    branches:
      - ci
    paths-ignore:
      # Documentation, site generator, and editor configs — no compile/test needed
      - 'doc/**'
      - 'docs/**'
      - '.readthedocs.yaml'
      - 'config/scripts/gh-pages/**'
      - 'config/editor/**'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'COPYING'
      - '**/*.md'

  pull_request:
    branches:
      - master
      - ci
    paths-ignore:
      - 'doc/**'
      - 'docs/**'
      - '.readthedocs.yaml'
      - 'config/scripts/gh-pages/**'
      - 'config/editor/**'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'COPYING'
      - '**/*.md'

  # Allow running this workflow manually from the Actions tab.
  workflow_dispatch:

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Parallel gcc inside urtt (HAVE_WORKING_FORK); does not change default local builds.
# Quiets Node 20 deprecation annotations for actions/* and third-party actions until they ship Node 24 builds.
env:
  RTT_JOBS: "16"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Test jobs are separate jobs per platform (MSYS2 vs Linux containers vs Alpine vs …) because one
# job cannot mix those environments. They all `needs: all-builds` so tests run only after every
# *-build job has succeeded (see job `all-builds`).

jobs:
  Windows-build:
    runs-on: ${{ matrix.cfg.os }}
    name: ${{ matrix.cfg.name }} (build)
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        cfg:
        -  { os: windows-latest,  name: 'Windows 64-bit', pkg: 'Windows_64-bit',  opt: '--enable-werror' }
        #-  { os: windows-latest,  name: 'Windows 32-bit', opt: '--build=i686-w64-mingw32 --host=i686-w64-mingw32' }

    defaults:
      run:
        shell: msys2 {0}

    steps:
    - uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: >-
          mingw-w64-ucrt-x86_64-gcc
          mingw-w64-ucrt-x86_64-diffutils
          mingw-w64-ucrt-x86_64-openssl
          mingw-w64-ucrt-x86_64-libpng
          mingw-w64-ucrt-x86_64-libjpeg-turbo
          make
          git

    - run: git config --global core.autocrlf input
      shell: bash

    - name: Checkout
      uses: actions/checkout@v6

    - name: Configure
      run: sh configure  ${{ matrix.cfg.opt }}

    - name: Make
      id: build
      run: make

    - name: HtmlDoc
      run: make htmldoc

    - name: Pack build tree
      if: success()
      # MSYS2: use Unix paths for tar; raw D:\... breaks the gzip child ("Cannot connect to D: resolve failed").
      run: |
        TARBALL="$(cygpath -u "$RUNNER_TEMP")/ci-build.tar.gz"
        WS="$(cygpath -u "$GITHUB_WORKSPACE")"
        tar --exclude='.git' -czf "$TARBALL" -C "$WS" .

    - name: Upload build artifact
      if: success()
      uses: actions/upload-artifact@v7
      with:
        name: ci-build-Windows-${{ matrix.cfg.name }}
        path: ${{ runner.temp }}/ci-build.tar.gz
        if-no-files-found: error

    - name: Summary
      if: always()
      run: |
        if [ -f unicon-config.log ]; then
          cat unicon-config.log
        else
          echo "unicon-config.log: (not present)"
        fi
        if [ -f unicon-features.log ]; then
          cat unicon-features.log
        else
          echo "unicon-features.log: (not present)"
        fi

  Windows-test:
    needs: all-builds
    runs-on: ${{ matrix.cfg.os }}
    name: ${{ matrix.cfg.name }} (test)
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        cfg:
        # os + name only: must match Windows-build rows (same artifact name as build job).
        -  { os: windows-latest,  name: 'Windows 64-bit' }

    defaults:
      run:
        shell: msys2 {0}

    steps:
    - uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: >-
          mingw-w64-ucrt-x86_64-gcc
          mingw-w64-ucrt-x86_64-diffutils
          mingw-w64-ucrt-x86_64-openssl
          mingw-w64-ucrt-x86_64-libpng
          mingw-w64-ucrt-x86_64-libjpeg-turbo
          make
          git

    - run: git config --global core.autocrlf input
      shell: bash

    - name: Download build artifact
      uses: actions/download-artifact@v7
      with:
        name: ci-build-Windows-${{ matrix.cfg.name }}
        path: ${{ runner.temp }}

    - name: Unpack build tree
      run: |
        WS="$(cygpath -u "$GITHUB_WORKSPACE")"
        mkdir -p "$WS"
        tar -xzf "$(cygpath -u "$RUNNER_TEMP")/ci-build.tar.gz" -C "$WS"

    - name: Test
      run: make Test

    # Unlike other platforms, Windows does not fail the job on test failures (still upload report for the combined summary).
    - name: TestReport
      run: |
        make -C tests Report 2>&1 | tee tests/test-report.txt
        # TODO: Re-enable when Windows test suite is green (fail CI on failed tests):
        # sh "$GITHUB_WORKSPACE/config/scripts/ci-check-test-report.sh" tests/test-report.txt

    - name: Upload test report
      if: ${{ always() }}
      uses: actions/upload-artifact@v7
      with:
        name: test-report-Windows-${{ matrix.cfg.name }}
        path: tests/test-report.txt
        if-no-files-found: warn

    - name: Summary
      if: always()
      run: |
        if [ -f unicon-config.log ]; then
          cat unicon-config.log
        else
          echo "unicon-config.log: (not present)"
        fi
        if [ -f unicon-features.log ]; then
          cat unicon-features.log
        else
          echo "unicon-features.log: (not present)"
        fi

  macOS-build:
    runs-on: ${{ matrix.cfg.os }}
    name: ${{ matrix.cfg.name }} (build)
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        cfg:
        -  { os: macos-15-intel, name: 'macOS intel', opt: '--enable-werror CC=clang CXX=clang++' }
        -  { os: macos-latest, name: 'macOS arm', opt: 'CC=clang CXX=clang++' }
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Configure
      run: sh configure  ${{ matrix.cfg.opt }}

    - name: Make
      id: build
      run: make

    - name: Install
      run: sudo make install

    - name: HtmlDoc
      run: make htmldoc

    - name: Pack build tree
      if: success()
      run: tar --exclude='.git' -czf "$RUNNER_TEMP/ci-build.tar.gz" -C "$GITHUB_WORKSPACE" .

    - name: Upload build artifact
      if: success()
      uses: actions/upload-artifact@v7
      with:
        name: ci-build-macOS-${{ matrix.cfg.name }}
        path: ${{ runner.temp }}/ci-build.tar.gz
        if-no-files-found: error

    - name: Summary
      if: always()
      run: |
        if [ -f unicon-config.log ]; then
          cat unicon-config.log
        else
          echo "unicon-config.log: (not present)"
        fi
        if [ -f unicon-features.log ]; then
          cat unicon-features.log
        else
          echo "unicon-features.log: (not present)"
        fi

  macOS-test:
    needs: all-builds
    runs-on: ${{ matrix.cfg.os }}
    name: ${{ matrix.cfg.name }} (test)
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        cfg:
        # os + name only: must match macOS-build rows (same artifact name as build job).
        -  { os: macos-15-intel, name: 'macOS intel' }
        -  { os: macos-latest, name: 'macOS arm' }
    steps:
    - name: Download build artifact
      uses: actions/download-artifact@v7
      with:
        name: ci-build-macOS-${{ matrix.cfg.name }}
        path: ${{ runner.temp }}

    - name: Unpack build tree
      run: mkdir -p "$GITHUB_WORKSPACE" && tar -xzf "$RUNNER_TEMP/ci-build.tar.gz" -C "$GITHUB_WORKSPACE"

    - name: Install
      run: sudo make install

    - name: Test
      run: make Test

    - name: TestReport
      run: |
        make -C tests Report 2>&1 | tee tests/test-report.txt
        sh "$GITHUB_WORKSPACE/config/scripts/ci-check-test-report.sh" tests/test-report.txt

    - name: Upload test report
      if: ${{ always() }}
      uses: actions/upload-artifact@v7
      with:
        name: test-report-macOS-${{ matrix.cfg.name }}
        path: tests/test-report.txt
        if-no-files-found: warn

    - name: Summary
      if: always()
      run: |
        if [ -f unicon-config.log ]; then
          cat unicon-config.log
        else
          echo "unicon-config.log: (not present)"
        fi
        if [ -f unicon-features.log ]; then
          cat unicon-features.log
        else
          echo "unicon-features.log: (not present)"
        fi

  Linux-build:
    runs-on: ubuntu-latest
    name: ${{ matrix.cfg.name }} (build)
    container: ${{ matrix.cfg.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        cfg:
        -  { os: 'ubuntu:22.04',  name: 'Ubuntu 22.04',   opt: '--enable-werror' }
        -  { os: 'ubuntu:24.04',  name: 'Ubuntu 24.04',   opt: '--enable-werror' }
        -  { os: 'fedora:41',     name: 'Fedora 41',      opt: '--enable-werror' }
        -  { os: 'debian:13',     name: 'Debian 13',      opt: '--enable-werror' }
        -  { os: 'debian:12',     name: 'Debian 12',      opt: '--enable-werror' }
        -  { os: 'rockylinux:9',  name: 'Rocky Linux 9',  opt: '--enable-werror' }
        -  { os: 'oraclelinux:8', name: 'Oracle Linux 8', opt: '--enable-werror' }
        -  { os: 'alpine:latest', name: 'Alpine Latest',  opt: '' }
    steps:

    - name: Install git for checkout
      run: |
        case "${{ matrix.cfg.os }}" in
           ubuntu*|debian*)
              apt-get update -q -y
              DEBIAN_FRONTEND="noninteractive" apt-get install -q -y git
              ;;
           oracle*|rocky*|fedora*)
              dnf -y install git
              ;;
           alpine*)
              apk update
              apk add git
              ;;
        esac

    - name: Checkout
      uses: actions/checkout@v6

    # Only *.deb files — caching the whole archives dir saves root-owned metadata and breaks restores.
    - name: Cache apt packages
      if: "contains(matrix.cfg.os, 'ubuntu') || contains(matrix.cfg.os, 'debian')"
      uses: actions/cache@v5
      with:
        path: /var/cache/apt/archives/*.deb
        key: apt-linux-${{ matrix.cfg.os }}-${{ hashFiles('debian/control') }}
        restore-keys: apt-linux-${{ matrix.cfg.os }}-

    - name: Install dependencies
      run: |
        case "${{ matrix.cfg.os }}" in
           ubuntu*|debian*)
              apt-get update -q -y
              DEBIAN_FRONTEND="noninteractive" apt-get install -q -y build-essential make autotools-dev libc6 libgcc1 libgl1-mesa-dev
              DEBIAN_FRONTEND="noninteractive" apt-get install -q -y libssl-dev libx11-dev libjpeg-dev libpng-dev libglu1-mesa-dev libxft-dev
              DEBIAN_FRONTEND="noninteractive" apt-get install -q -y libopenal-dev libalut-dev libogg-dev libvorbis-dev unixodbc-dev libfreetype6-dev
              ;;
           oracle*)
              dnf -y update
              dnf -y install git gcc make diffutils libjpeg-turbo-devel libpng-devel libX11-devel mesa-libGL-devel mesa-libGLU-devel
              dnf -y install openssl-devel unixODBC-devel freetype-devel libXft-devel
              ;;
           rocky*)
              dnf -y update
              dnf -y install git gcc make diffutils libjpeg-turbo-devel libpng-devel libX11-devel mesa-libGL-devel mesa-libGLU-devel
              dnf -y install openssl-devel freetype-devel libXft-devel
              ;;
           fedora*)
              dnf -y update
              dnf -y install gcc make diffutils libjpeg-turbo-devel libpng-devel libX11-devel mesa-libGL-devel mesa-libGLU-devel
              dnf -y install openal-devel freealut-devel libogg-devel libvorbis-devel openssl-devel unixODBC-devel freetype-devel libXft-devel
              ;;
           alpine*)
              apk update
              apk add build-base diffutils
              ;;
            esac

    - name: Configure
      run: ./configure ${{ matrix.cfg.opt }}

    - name: Make
      id: build
      run: make

    - name: Install
      run:  make install

    - name: HtmlDoc
      run: make htmldoc

    - name: Pack build tree
      if: success()
      run: tar --exclude='.git' -czf /tmp/ci-build.tar.gz -C "$GITHUB_WORKSPACE" .

    - name: Upload build artifact
      if: success()
      uses: actions/upload-artifact@v7
      with:
        name: ci-build-Linux-${{ matrix.cfg.name }}
        path: /tmp/ci-build.tar.gz
        if-no-files-found: error

    - name: Summary
      if: always()
      run: |
        if [ -f unicon-config.log ]; then
          cat unicon-config.log
        else
          echo "unicon-config.log: (not present)"
        fi
        if [ -f unicon-features.log ]; then
          cat unicon-features.log
        else
          echo "unicon-features.log: (not present)"
        fi

  Linux-test:
    needs: all-builds
    runs-on: ubuntu-latest
    name: ${{ matrix.cfg.name }} (test)
    container: ${{ matrix.cfg.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        cfg:
        # os + name only: must match Linux-build rows (same artifact name as build job).
        -  { os: 'ubuntu:22.04',  name: 'Ubuntu 22.04' }
        -  { os: 'ubuntu:24.04',  name: 'Ubuntu 24.04' }
        -  { os: 'fedora:41',     name: 'Fedora 41' }
        -  { os: 'debian:13',     name: 'Debian 13' }
        -  { os: 'debian:12',     name: 'Debian 12' }
        -  { os: 'rockylinux:9',  name: 'Rocky Linux 9' }
        -  { os: 'oraclelinux:8', name: 'Oracle Linux 8' }
        -  { os: 'alpine:latest', name: 'Alpine Latest' }
    steps:

    - name: Download build artifact
      uses: actions/download-artifact@v7
      with:
        name: ci-build-Linux-${{ matrix.cfg.name }}
        path: /tmp

    - name: Unpack build tree
      run: mkdir -p "$GITHUB_WORKSPACE" && tar -xzf /tmp/ci-build.tar.gz -C "$GITHUB_WORKSPACE"

    - name: Install
      run: make install

    - name: Test
      run: make Test

    # In container jobs, ${{ github.workspace }} is expanded to the runner host path; the shell runs
    # inside the container where the repo lives under $GITHUB_WORKSPACE instead.
    - name: TestReport
      run: |
        make -C tests Report 2>&1 | tee tests/test-report.txt
        sh "$GITHUB_WORKSPACE/config/scripts/ci-check-test-report.sh" tests/test-report.txt

    - name: Upload test report
      if: ${{ always() }}
      uses: actions/upload-artifact@v7
      with:
        name: test-report-Linux-${{ matrix.cfg.name }}
        path: tests/test-report.txt
        if-no-files-found: warn

    - name: Summary
      if: always()
      run: |
        if [ -f unicon-config.log ]; then
          cat unicon-config.log
        else
          echo "unicon-config.log: (not present)"
        fi
        if [ -f unicon-features.log ]; then
          cat unicon-features.log
        else
          echo "unicon-features.log: (not present)"
        fi

  Alpine-build:
    runs-on: ubuntu-latest
    name: Alpine ${{ matrix.platform.arch }} (build)
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        platform:
         -  { arch: riscv64, configure_opt: "", make_flags: '-j8' } # emulated
         -  { arch: x86, configure_opt: "", make_flags: '' }
    steps:
    - name: Install extra dependencies
      shell: 'sh'
      run: |
        sudo apt update && sudo apt install -y binfmt-support

    - name: alpine
      uses: jirutka/setup-alpine@ae3b3ddba35054804fc4a3507b519fa7e8152050
      with:
        arch:  ${{ matrix.platform.arch }}
        branch: v3.20
        packages: >
          build-base
          diffutils

    - name: Checkout
      uses: actions/checkout@v6

    - name: Configure
      run: ./configure ${{ matrix.platform.configure_opt }}
      shell: alpine.sh {0}

    - name: Make
      id: build
      run: make ${{ matrix.platform.make_flags }}
      shell: alpine.sh {0}

    - name: Pack build tree
      if: success()
      run: tar --exclude='.git' -czf "$RUNNER_TEMP/ci-build.tar.gz" -C "$GITHUB_WORKSPACE" .
      shell: alpine.sh {0}

    - name: Upload build artifact
      if: success()
      uses: actions/upload-artifact@v7
      with:
        name: ci-build-Alpine-${{ matrix.platform.arch }}
        path: ${{ runner.temp }}/ci-build.tar.gz
        if-no-files-found: error

    - name: Summary
      if: always()
      run: |
        if [ -f unicon-config.log ]; then
          cat unicon-config.log
        else
          echo "unicon-config.log: (not present)"
        fi
        if [ -f unicon-features.log ]; then
          cat unicon-features.log
        else
          echo "unicon-features.log: (not present)"
        fi
      shell: alpine.sh {0}

  Alpine-test:
    needs: all-builds
    runs-on: ubuntu-latest
    name: Alpine ${{ matrix.platform.arch }} (test)
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        platform:
        # arch only: must match Alpine-build rows (same artifact name as build job).
         -  { arch: riscv64 }
         -  { arch: x86 }
    steps:
    - name: Install extra dependencies
      shell: 'sh'
      run: |
        sudo apt update && sudo apt install -y binfmt-support

    - name: alpine
      uses: jirutka/setup-alpine@ae3b3ddba35054804fc4a3507b519fa7e8152050
      with:
        arch:  ${{ matrix.platform.arch }}
        branch: v3.20
        packages: >
          build-base
          diffutils

    - name: Download build artifact
      uses: actions/download-artifact@v7
      with:
        name: ci-build-Alpine-${{ matrix.platform.arch }}
        path: ${{ runner.temp }}

    - name: Unpack build tree
      run: mkdir -p "$GITHUB_WORKSPACE" && tar -xzf "$RUNNER_TEMP/ci-build.tar.gz" -C "$GITHUB_WORKSPACE"
      shell: alpine.sh {0}

    - name: Test
      run: make Test
      shell: alpine.sh {0}

    - name: TestReport
      run: |
        make -C tests Report 2>&1 | tee tests/test-report.txt
        sh "$GITHUB_WORKSPACE/config/scripts/ci-check-test-report.sh" tests/test-report.txt
      shell: alpine.sh {0}

    - name: Upload test report
      if: ${{ always() }}
      uses: actions/upload-artifact@v7
      with:
        name: test-report-Alpine-${{ matrix.platform.arch }}
        path: tests/test-report.txt
        if-no-files-found: warn

    - name: Summary
      if: always()
      run: |
        if [ -f unicon-config.log ]; then
          cat unicon-config.log
        else
          echo "unicon-config.log: (not present)"
        fi
        if [ -f unicon-features.log ]; then
          cat unicon-features.log
        else
          echo "unicon-features.log: (not present)"
        fi
      shell: alpine.sh {0}

  Features-build:
    runs-on: ${{ matrix.cfg.os }}
    name: ${{ matrix.cfg.name }} (build)
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        cfg:
        # -  { os: ubuntu-latest, name: 'Ubuntu 32-bit',  opt: '--host=i686-pc-linux-gnu' }
        -  { os: ubuntu-latest, name: 'Clang',          opt: 'CC=clang CXX=clang++ --enable-werror' }
        -  { os: ubuntu-latest, name: 'No Graphics',    opt: '--disable-graphics --enable-werror' }
        -  { os: ubuntu-latest, name: 'No 3D Graphics', opt: '--disable-graphics3d --enable-werror' }
        -  { os: ubuntu-latest, name: 'No Concurrency', opt: '--disable-concurrency --enable-werror' }
        -  { os: ubuntu-latest, name: 'Pthreadcoswitch', opt: '--disable-native-coswitch --enable-werror' }
        -  { os: ubuntu-latest, name: 'Heap Test',      opt: '--enable-debugheap  --enable-verifyheap --enable-werror' }
        -  { os: ubuntu-latest, name: 'Thin Build',     opt: '--enable-thin --enable-werror' }
        -  { os: ubuntu-latest, name: 'Dev Mode',       opt: '--enable-devmode' }
        -  { os: ubuntu-24.04-arm, name: 'Ubuntu arm64',  opt: '--enable-werror' }
        # -  { os: ubuntu-24.04-arm, name: 'Ubuntu arm32',  opt: '--host=armv7-unknown-linux-gnueabihf --build=armv7-unknown-linux-gnueabihf --enable-werror' }

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Cache apt packages
      uses: actions/cache@v5
      with:
        path: /var/cache/apt/archives/*.deb
        key: apt-features-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('debian/control') }}
        restore-keys: apt-features-${{ runner.os }}-${{ runner.arch }}-

    - name: Install dependencies
      run: |
        sudo apt-get update -q -y
        # binfmt-support is not needed for native builds, re-add if needed for cross builds
        # sudo apt install -y binfmt-support
        if [[ "${{ matrix.cfg.name }}" = "Ubuntu 32-bit" ]]
        then
        # Install tools to cross compile 32-bit
        sudo dpkg --add-architecture i386
        sudo apt-get update
        # sudo apt install -q -y i686-pc-linux-gnu-gcc
        sudo apt-get install -q -y gcc-multilib g++-multilib
        sudo apt install libssl-dev:i386
        fi

        if [[ "${{ matrix.cfg.name }}" = "Ubuntu arm32" ]]
        then
        # Install tools to cross compile 32-bit
        sudo apt-get update
        sudo apt install -q -y gcc-arm-linux-gnueabi binutils-arm-linux-gnueabi
        fi

        # Easy way to install all dependencies
        sudo apt-get install -q -y devscripts equivs
        sudo mk-build-deps --install debian/control

    - name: Configure
      run: ./configure ${{ matrix.cfg.opt }}

    - name: Make
      id: build
      run: make
      # set VRFY globally even though it is only needed in the debug test
      env:
        VRFY: -2

    - name: HtmlDoc
      run: make htmldoc

    - name: Pack build tree
      if: success()
      run: tar --exclude='.git' -czf "$RUNNER_TEMP/ci-build.tar.gz" -C "$GITHUB_WORKSPACE" .

    - name: Upload build artifact
      if: success()
      uses: actions/upload-artifact@v7
      with:
        name: ci-build-Features-${{ matrix.cfg.name }}
        path: ${{ runner.temp }}/ci-build.tar.gz
        if-no-files-found: error

    - name: Summary
      if: always()
      run: |
        if [ -f unicon-config.log ]; then
          cat unicon-config.log
        else
          echo "unicon-config.log: (not present)"
        fi
        if [ -f unicon-features.log ]; then
          cat unicon-features.log
        else
          echo "unicon-features.log: (not present)"
        fi

  Features-test:
    needs: all-builds
    runs-on: ${{ matrix.cfg.os }}
    name: ${{ matrix.cfg.name }} (test)
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        cfg:
        # Only os + name: must match Features-build rows (same artifact name as build job).
        -  { os: ubuntu-latest, name: 'Clang' }
        -  { os: ubuntu-latest, name: 'No Graphics' }
        -  { os: ubuntu-latest, name: 'No 3D Graphics' }
        -  { os: ubuntu-latest, name: 'No Concurrency' }
        -  { os: ubuntu-latest, name: 'Pthreadcoswitch' }
        -  { os: ubuntu-latest, name: 'Heap Test' }
        -  { os: ubuntu-latest, name: 'Thin Build' }
        -  { os: ubuntu-latest, name: 'Dev Mode' }
        -  { os: ubuntu-24.04-arm, name: 'Ubuntu arm64' }

    steps:
    - name: Download build artifact
      uses: actions/download-artifact@v7
      with:
        name: ci-build-Features-${{ matrix.cfg.name }}
        path: ${{ runner.temp }}

    - name: Unpack build tree
      run: mkdir -p "$GITHUB_WORKSPACE" && tar -xzf "$RUNNER_TEMP/ci-build.tar.gz" -C "$GITHUB_WORKSPACE"

    - name: Test
      run: make Test
      env:
        VRFY: -2

    - name: TestReport
      run: |
        make -C tests Report 2>&1 | tee tests/test-report.txt
        sh "$GITHUB_WORKSPACE/config/scripts/ci-check-test-report.sh" tests/test-report.txt

    - name: Upload test report
      if: ${{ always() }}
      uses: actions/upload-artifact@v7
      with:
        name: test-report-Features-${{ matrix.cfg.name }}
        path: tests/test-report.txt
        if-no-files-found: warn

    - name: Summary
      if: always()
      run: |
        if [ -f unicon-config.log ]; then
          cat unicon-config.log
        else
          echo "unicon-config.log: (not present)"
        fi
        if [ -f unicon-features.log ]; then
          cat unicon-features.log
        else
          echo "unicon-features.log: (not present)"
        fi

  # Build and tests share one vmactions VM session (avoids a second VM cold start).
  FreeBSD:
   runs-on: ubuntu-latest
   name: FreeBSD
   timeout-minutes: 45

   steps:
   - uses: actions/checkout@v6
   - name: Start FreeBSD VM
     id: vm
     uses: vmactions/freebsd-vm@v1.4.4
     with:
      usesh: true # default shell is csh, switch to sh
      prepare: |
        pkg install -y -f autoconf gmake lang/gcc git

   - name: Configure
     shell: freebsd {0}
     run: |
      cd $GITHUB_WORKSPACE
      git config --global --add safe.directory $GITHUB_WORKSPACE
      ./configure

   - name: Make
     id: build
     shell: freebsd {0}
     run: cd $GITHUB_WORKSPACE && gmake

   - name: HtmlDoc
     shell: freebsd {0}
     run: |
      cd $GITHUB_WORKSPACE
      # UniDoc with --resolve is heavy; default stack rlimit has caused intermittent
      # SIGBUS (Bus error) on FreeBSD CI. vmactions flakes also show up here.
      ulimit -s unlimited 2>/dev/null || true
      n=0
      until gmake htmldoc; do
        n=$((n + 1))
        if [ "$n" -ge 3 ]; then
          echo "gmake htmldoc failed after 3 attempts"
          exit 1
        fi
        echo "gmake htmldoc failed (attempt $n), retrying in 5s..."
        sleep 5
      done

   - name: Test
     shell: freebsd {0}
     run: cd $GITHUB_WORKSPACE && gmake Test

   # Tee to repo root so the file is on the runner workspace (vmactions sometimes omits subpaths under tests/).
   # Like Windows: do not fail the job on test-report failures (still upload for combined summary).
   - name: TestReport
     if: ${{ steps.build.outcome == 'success' }}
     shell: freebsd {0}
     run: |
       cd $GITHUB_WORKSPACE
       gmake -C tests Report 2>&1 | tee test-report.txt
       # TODO: Re-enable when FreeBSD test suite is green:
       # sh "$GITHUB_WORKSPACE/config/scripts/ci-check-test-report.sh" "$GITHUB_WORKSPACE/test-report.txt"

   # Custom `shell: freebsd` steps run over SSH into a persistent VM; the host workspace is not
   # rsynced after each step (only the initial vmactions action copybacks). Pull the report onto the
   # runner so upload-artifact can see it.
   - name: Sync test report from VM to host
     if: ${{ always() && steps.build.outcome == 'success' }}
     run: |
       set -euo pipefail
       if ssh freebsd "test -f ${GITHUB_WORKSPACE}/test-report.txt"; then
         rsync -a -e ssh "freebsd:${GITHUB_WORKSPACE}/test-report.txt" "${GITHUB_WORKSPACE}/test-report.txt"
       else
         echo "::warning::test-report.txt not found in FreeBSD VM; skipping sync (TestReport may have failed before tee wrote a file)."
       fi

   - name: Upload test report
     if: ${{ always() && steps.build.outcome == 'success' }}
     uses: actions/upload-artifact@v7
     with:
       name: test-report-FreeBSD
       path: test-report.txt
       if-no-files-found: warn

   - name: Summary
     if: always()
     shell: freebsd {0}
     run: |
      cd $GITHUB_WORKSPACE
      if [ -f unicon-config.log ]; then
        cat unicon-config.log
      else
        echo "unicon-config.log: (not present)"
      fi
      if [ -f unicon-features.log ]; then
        cat unicon-features.log
      else
        echo "unicon-features.log: (not present)"
      fi

  DebianPkg-build:
    runs-on: ${{ matrix.cfg.os }}
    name: ${{ matrix.cfg.name }} (build)
    timeout-minutes: 45
    env:
      DISTROOT: /tmp/unicon
    strategy:
      matrix:
        cfg:
        -  { os: ubuntu-22.04,  name: 'Debian-Pkg',   opt: '' }

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Cache apt packages
      uses: actions/cache@v5
      with:
        path: /var/cache/apt/archives/*.deb
        key: apt-debianpkg-${{ matrix.cfg.os }}-${{ hashFiles('debian/control') }}
        restore-keys: apt-debianpkg-${{ matrix.cfg.os }}-

    - name: Install dependencies
      run: |
        sudo apt-get update -q -y
        sudo apt-get install -q -y build-essential fakeroot devscripts equivs dh-autoreconf
        sudo mk-build-deps --install debian/control

    - name: Configure
      run: ./configure ${{ matrix.cfg.opt }}

    - name: Deb
      id: build
      run: |
        mkdir -p "$DISTROOT"
        make debin DISTROOT="$DISTROOT"
        mkdir debian-pkg
        cp "$DISTROOT"/unicondist/unicon_*.deb debian-pkg/
        cp "$DISTROOT"/unicondist/unicon_*.changes debian-pkg/
        cp "$DISTROOT"/unicondist/unicon_*.dsc debian-pkg/
        cp "$DISTROOT"/unicondist/unicon_*.debian.tar.xz debian-pkg/
        cp "$DISTROOT"/unicondist/unicon_*.orig.tar.gz debian-pkg/

    - name: Install
      run: |
        shopt -s nullglob
        debs=(./debian-pkg/*.deb)
        if [ "${#debs[@]}" -eq 0 ]; then
          echo "No .deb packages under debian-pkg/; did the Deb step succeed?"
          exit 1
        fi
        sudo apt install -y "${debs[@]}"

    - name: Pack workspace and distroot for test job
      if: success()
      run: |
        set -euo pipefail
        mkdir -p /tmp/ci-debianpkg-pack/ws /tmp/ci-debianpkg-pack/distroot
        cp -a "$GITHUB_WORKSPACE"/. /tmp/ci-debianpkg-pack/ws/
        cp -a "$DISTROOT"/. /tmp/ci-debianpkg-pack/distroot/
        tar -C /tmp/ci-debianpkg-pack -czf /tmp/ci-debianpkg.tar.gz .

    - name: Upload build artifact
      if: success()
      uses: actions/upload-artifact@v7
      with:
        name: ci-build-DebianPkg
        path: /tmp/ci-debianpkg.tar.gz
        if-no-files-found: error

  # Gate: every *-build must succeed before any artifact-based test job runs.
  all-builds:
    name: All builds passed
    needs:
      - Windows-build
      - macOS-build
      - Linux-build
      - Alpine-build
      - Features-build
      - DebianPkg-build
    runs-on: ubuntu-latest
    steps:
      - run: echo "All platform builds succeeded; running tests."

  DebianPkg-test:
    needs: all-builds
    runs-on: ${{ matrix.cfg.os }}
    name: ${{ matrix.cfg.name }} (test)
    timeout-minutes: 45
    env:
      DISTROOT: /tmp/unicon
    strategy:
      matrix:
        cfg:
        # os + name only: must match DebianPkg-build.
        -  { os: ubuntu-22.04,  name: 'Debian-Pkg' }

    steps:
    - name: Download build artifact
      uses: actions/download-artifact@v7
      with:
        name: ci-build-DebianPkg
        path: ${{ runner.temp }}

    - name: Unpack and restore layout
      run: |
        set -euo pipefail
        mkdir -p "$GITHUB_WORKSPACE"
        find "$GITHUB_WORKSPACE" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
        mkdir -p /tmp/ci-debianpkg-unpack
        tar -xzf "$RUNNER_TEMP/ci-debianpkg.tar.gz" -C /tmp/ci-debianpkg-unpack
        cp -a /tmp/ci-debianpkg-unpack/ws/. "$GITHUB_WORKSPACE"/
        sudo rm -rf "$DISTROOT"
        sudo mkdir -p "$DISTROOT"
        sudo cp -a /tmp/ci-debianpkg-unpack/distroot/. "$DISTROOT"/

    - name: Reinstall packages from tree
      run: |
        set -euo pipefail
        cd "$GITHUB_WORKSPACE"
        shopt -s nullglob
        debs=(./debian-pkg/*.deb)
        if [ "${#debs[@]}" -eq 0 ]; then
          echo "No .deb packages under debian-pkg/; unpack failed?"
          exit 1
        fi
        sudo apt install -y "${debs[@]}"

    - name: Test
      run: |
        set -euo pipefail
        # loadfunc: libcfunc.so lives under DISTROOT/unicondist/<deb-src-dir>/bin from debuild, not beside apt-installed unicon.
        debdir=$(ls -d "$DISTROOT"/unicondist/unicon_* 2>/dev/null | head -1 || true)
        if [ -n "${debdir}" ] && [ -d "${debdir}/bin" ]; then export FPATH="${debdir}/bin"
        else export FPATH="${{ github.workspace }}/bin"; fi
        export UC=unicon UDB=udb
        make Test

    # Same as Test: installed package provides `unicon` / `udb` on PATH, not ../bin/...
    - name: TestReport
      run: |
        set -euo pipefail
        debdir=$(ls -d "$DISTROOT"/unicondist/unicon_* 2>/dev/null | head -1 || true)
        if [ -n "${debdir}" ] && [ -d "${debdir}/bin" ]; then export FPATH="${debdir}/bin"
        else export FPATH="${{ github.workspace }}/bin"; fi
        export UC=unicon UDB=udb
        make -C tests Report 2>&1 | tee tests/test-report.txt
        sh "$GITHUB_WORKSPACE/config/scripts/ci-check-test-report.sh" tests/test-report.txt

    - name: Upload test report
      if: ${{ always() }}
      uses: actions/upload-artifact@v7
      with:
        name: test-report-DebianPkg
        path: tests/test-report.txt
        if-no-files-found: warn

  # Merge every per-job tests/test-report.txt (uploaded as test-report-*) into one artifact.
  test-report-all-platforms:
    name: Combined test report (all platforms)
    if: always()
    needs:
      - Windows-test
      - macOS-test
      - Linux-test
      - Alpine-test
      - Features-test
      - FreeBSD
      - DebianPkg-test
    runs-on: ubuntu-latest
    steps:
      - name: Download all test-report artifacts
        uses: actions/download-artifact@v7
        with:
          path: collected
          pattern: test-report-*
          merge-multiple: false

      - name: Build combined summary file
        shell: bash
        env:
          RUN_ID: ${{ github.run_id }}
          PR_NUMBER: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || '' }}
        run: |
          set -euo pipefail
          out=all-platforms-test-report.txt
          list=$(mktemp)
          stats=combined-platform-stats.tsv
          : > "$stats"
          trap 'rm -f "$list"' EXIT

          pr_disp="—"
          if [ -n "${PR_NUMBER:-}" ]; then pr_disp="#${PR_NUMBER}"; fi

          # stats file stores seconds (digits) or "-" — display as m:ss in tables
          sec_to_mmss() {
            local x="${1:-}"
            if [[ ! "${x}" =~ ^[0-9]+$ ]]; then
              printf '%s' "${x:--}"
              return
            fi
            printf '%d:%02d' "$((x / 60))" "$((x % 60))"
          }

          # Per-suite Summary lines from tests/Makefile.test: "...  FAIL: a.icn b.icn"
          # (not the aggregate "Result:" line — that has no "FAIL:").
          failed_icns_from_report() {
            local f="$1"
            # grep exits 1 when there are no matches; with pipefail that fails the whole pipeline
            # and aborts this step under set -e when assigning flist= below.
            { tr -d '\r' < "$f" | grep 'FAIL:' 2>/dev/null || true; } | sed 's/.*FAIL:[[:space:]]*//' | tr '\n' ' ' | sed 's/[[:space:]]\+/ /g;s/[[:space:]]*$//'
          }

          echo "::group::Artifact download layout"
          ls -laR collected 2>&1 || echo "(no collected/ directory)"
          echo "::endgroup::"

          find collected -type f -name 'test-report.txt' 2>/dev/null | sort > "$list" || true
          n=$(wc -l < "$list" | tr -d ' ')
          echo "Found ${n} test-report.txt file(s)."

          {
            echo "Unicon CI — combined test reports"
            echo "Run ID: ${RUN_ID}  PR: ${pr_disp}"
            echo "Workflow: ${{ github.workflow }}  Ref: ${{ github.ref }}"
            echo ""
          } > "$out"

          if [ ! -s "$list" ]; then
            echo "(No test-report artifacts were downloaded; jobs may have failed before upload.)" >> "$out"
            {
              echo "### All platforms summary"
              echo ""
              echo "| Platform | passed | failed | skipped | time (mm:ss) |"
              echo "|----------|--------|--------|---------|--------------|"
              echo "| *(no artifacts downloaded)* | - | - | - | - | - |"
            } > platform-summary.md
          else
            while IFS= read -r report_file; do
              [ -n "$report_file" ] || continue
              rel="${report_file#collected/}"
              section="${rel%%/*}"
              section="${section#test-report-}"
              echo "" >> "$out"
              echo "################################################################" >> "$out"
              echo "# ${section}" >> "$out"
              echo "################################################################" >> "$out"
              cat "$report_file" >> "$out"
              # Do not use grep -i 'FAIL' on the report: -i matches the substring "fail"
              # inside "0 failed" on PASS lines, so every platform was listed as failed.
              flist=$(failed_icns_from_report "$report_file")
              line=$(tr -d '\r' < "$report_file" | grep -E 'Result:.*\([0-9]+ passed,' 2>/dev/null | tail -1 || true)
              if [[ -n "${line:-}" ]] && [[ "$line" =~ \(([0-9]+)\ passed,\ ([0-9]+)\ failed,\ ([0-9]+)\ skipped\) ]]; then
                p="${BASH_REMATCH[1]}"
                failed_n="${BASH_REMATCH[2]}"
                s="${BASH_REMATCH[3]}"
                tsec="-"
                if [[ "$line" =~ in\ ([0-9]+)\ seconds ]]; then
                  tsec="${BASH_REMATCH[1]}"
                fi
                flist_disp=""
                if [ "${failed_n}" -gt 0 ]; then
                  if [ -n "${flist}" ]; then
                    flist_disp="${flist}"
                  else
                    flist_disp="(see full report)"
                  fi
                fi
                printf '%s\t%s\t%s\t%s\t%s\t%s\n' "$section" "$p" "$failed_n" "$s" "$tsec" "$flist_disp" >> "$stats"
              else
                flist_disp=""
                if tr -d '\r' < "$report_file" | grep -qE '^Result:[[:space:]]+FAIL' 2>/dev/null; then
                  if [ -n "${flist}" ]; then
                    flist_disp="${flist}"
                  else
                    flist_disp="(see full report)"
                  fi
                fi
                printf '%s\t-\t-\t-\t-\t%s\n' "$section" "$flist_disp" >> "$stats"
              fi
            done < "$list"
            _sorttmp=$(mktemp)
            awk -F'\t' '{
              k = ($3 ~ /^[0-9]+$/) ? $3 : 999999
              print k "\t" $0
            }' "$stats" | sort -t $'\t' -k1,1n -k2,2 | cut -f2- > "$_sorttmp" && mv "$_sorttmp" "$stats"
            {
              echo ""
              echo "================================================================"
              echo "All platforms summary"
              echo "================================================================"
              echo ""
              printf '%-32s %5s %5s %5s %8s  %s\n' "Platform" "pass" "fail" "skip" "time" "failed tests (.icn)"
              printf '%-32s %5s %5s %5s %8s  %s\n' "--------------------------------" "-----" "-----" "-----" "--------" "-------------------------"
              tp=0 tf=0 ts=0 ttot=0 thave=0
              while IFS=$'\t' read -r sec pp ff ss tt flrow; do
                [ -n "${sec:-}" ] || continue
                ttfmt=$(sec_to_mmss "$tt")
                fdisp="${flrow:-}"
                if [[ "${ff:-}" =~ ^[0-9]+$ ]] && [ "${ff}" -eq 0 ]; then
                  fdisp=""
                fi
                printf '%-32s %5s %5s %5s %8s  %s\n' "$sec" "$pp" "$ff" "$ss" "$ttfmt" "$fdisp"
                if [[ "$pp" =~ ^[0-9]+$ ]]; then tp=$((tp + pp)); fi
                if [[ "$ff" =~ ^[0-9]+$ ]]; then tf=$((tf + ff)); fi
                if [[ "$ss" =~ ^[0-9]+$ ]]; then ts=$((ts + ss)); fi
                if [[ "$tt" =~ ^[0-9]+$ ]]; then ttot=$((ttot + tt)); thave=1; fi
              done < "$stats"
              ttdisp="-"
              if [ "${thave:-0}" -ne 0 ]; then ttdisp=$(sec_to_mmss "$ttot"); fi
              printf '%-32s %5s %5s %5s %8s  %s\n' "--------------------------------" "-----" "-----" "-----" "--------" ""
              printf '%-32s %5s %5s %5s %8s  %s\n' "Total:" "$tp" "$tf" "$ts" "$ttdisp" ""
              echo ""
            } >> "$out"
            {
              echo "### All platforms summary" > platform-summary.md
              echo "" >> platform-summary.md
              echo "| Platform | pass | fail | skip | time | failed tests |" >> platform-summary.md
              echo "|----------|-----:|-----:|-----:|------|--------------|" >> platform-summary.md
              while IFS=$'\t' read -r sec pp ff ss tt flrow; do
                [ -n "${sec:-}" ] || continue
                ttfmt=$(sec_to_mmss "$tt")
                fdisp="${flrow:-}"
                if [[ "${ff:-}" =~ ^[0-9]+$ ]] && [ "${ff}" -eq 0 ]; then
                  fdisp=""
                fi
                esc=$(printf '%s' "$fdisp" | sed 's/|/\\|/g')
                echo "| ${sec} | ${pp} | ${ff} | ${ss} | ${ttfmt} | ${esc} |" >> platform-summary.md
              done < "$stats"
              tp=0 tf=0 ts=0 ttot=0 thave=0
              while IFS=$'\t' read -r sec pp ff ss tt flrow; do
                [ -n "${sec:-}" ] || continue
                if [[ "$pp" =~ ^[0-9]+$ ]]; then tp=$((tp + pp)); fi
                if [[ "$ff" =~ ^[0-9]+$ ]]; then tf=$((tf + ff)); fi
                if [[ "$ss" =~ ^[0-9]+$ ]]; then ts=$((ts + ss)); fi
                if [[ "$tt" =~ ^[0-9]+$ ]]; then ttot=$((ttot + tt)); thave=1; fi
              done < "$stats"
              ttdisp="-"
              if [ "${thave:-0}" -ne 0 ]; then ttdisp=$(sec_to_mmss "$ttot"); fi
              echo "| **Total** | **${tp}** | **${tf}** | **${ts}** | **${ttdisp}** | |" >> platform-summary.md
            }
          fi

          echo "::group::Combined file stats"
          wc -l "$out"
          wc -c "$out"
          echo "::endgroup::"

          echo "::group::Combined report preview (first 80 lines; full file in artifact)"
          head -n 80 "$out"
          echo "::endgroup::"

      # Upload before Summary + failure gate so the artifact exists even if a later step errors,
      # and so the gate cannot prevent the artifact from uploading.
      - name: Upload combined report
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: all-platforms-test-report
          path: all-platforms-test-report.txt
          if-no-files-found: warn

      # Step Summary has a ~1MB limit; oversized writes often show up empty. Truncate for the web UI;
      # the full report is always in the all-platforms-test-report artifact.
      - name: Show report in workflow summary
        if: always()
        shell: bash
        env:
          SUMMARY_MAX_BYTES: '700000'
          RUN_ID: ${{ github.run_id }}
          PR_NUMBER: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || '' }}
        run: |
          set -euo pipefail
          if [ ! -f all-platforms-test-report.txt ]; then
            echo "No combined report on disk; skipping Step Summary (build may have failed)."
            exit 0
          fi
          : "${GITHUB_STEP_SUMMARY:?GITHUB_STEP_SUMMARY is not set}"
          pr_disp="—"
          if [ -n "${PR_NUMBER:-}" ]; then pr_disp="#${PR_NUMBER}"; fi
          {
            echo "## Combined test report (all platforms)"
            echo ""
            echo "**Run ID:** ${RUN_ID}  ·  **PR:** ${pr_disp}"
            echo ""
            echo "Download artifact **all-platforms-test-report** for the full file (no size limit)."
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -f platform-summary.md ]; then
            cat platform-summary.md >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi

          bytes=$(wc -c < all-platforms-test-report.txt)
          max=${SUMMARY_MAX_BYTES:?}

          if [ "$bytes" -le "$max" ]; then
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            cat all-platforms-test-report.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "*Showing first ${max} bytes of ${bytes} total (Step Summary size limit).*"
              echo ""
              echo '```text'
              head -c "$max" all-platforms-test-report.txt
              printf '\n\n... [truncated for GitHub Step Summary]\n'
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          sz=$(wc -c < "$GITHUB_STEP_SUMMARY" | tr -d ' ')
          echo "Step Summary size (bytes): ${sz}"

          # Job Summary panel is easy to miss (run page → this job → Summary next to Logs). Always mirror a
          # slice here so the report is visible inside the step log without hunting the UI.
          echo "::group::Combined report (copy for log — full file in Job Summary + artifact)"
          tot=$(wc -l < all-platforms-test-report.txt | tr -d ' ')
          head -n 400 all-platforms-test-report.txt
          if [ "${tot:-0}" -gt 400 ]; then
            echo ""
            echo "... ($((tot - 400)) more lines — open Job Summary on this job, or download artifact **all-platforms-test-report**)"
          fi
          echo "::endgroup::"

          echo "::notice title=Where to see the full formatted report::On the workflow run page, open job **Combined test report (all platforms)** → tab **Summary** (beside **Logs**). This step also prints the first 400 lines above."
