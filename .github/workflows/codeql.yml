name: "CodeQL"

on:
  push:
    branches: [ "master" ]
    paths-ignore:
      - 'doc/**'
      - 'docs/**'
      - '.readthedocs.yaml'
      - 'config/scripts/gh-pages/**'
      - 'config/editor/**'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'COPYING'
      - '**/*.md'
  pull_request:
    branches: [ "master" ]
    paths-ignore:
      - 'doc/**'
      - 'docs/**'
      - '.readthedocs.yaml'
      - 'config/scripts/gh-pages/**'
      - 'config/editor/**'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'COPYING'
      - '**/*.md'

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ cpp ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update -q -y
          sudo apt-get install -q -y build-essential devscripts equivs
          sudo mk-build-deps --install debian/control

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          config-file: ./.github/codeql.yml
          queries: +security-and-quality

      - name: Build
        run: |
          ./configure --enable-werror
          make

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
