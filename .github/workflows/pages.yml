# GitHub Pages (single _site/ artifact):
#   README.md           → index.html
#   doc/**              → doc/… (plus doc/README.md → doc/index.html)
#   CONTRIBUTING.md     → CONTRIBUTING.md + CONTRIBUTING.html
#   COPYING             → COPYING
# Repo Settings → Pages → Source: GitHub Actions.
#
# Pull requests run build only (no deploy) so you can verify before merge.

name: Pages

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'COPYING'
      - 'doc/**'
      - '.github/workflows/pages.yml'
  pull_request:
    paths:
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'COPYING'
      - 'doc/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.repository == 'uniconproject/unicon'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Build site
        run: |
          set -e
          SITE=_site
          rm -rf "$SITE"
          mkdir -p "$SITE/doc"
          pandoc README.md -o "$SITE/index.html" \
            --standalone \
            --metadata title="Unicon" \
            -t html5
          cp -a doc/. "$SITE/doc/"
          pandoc doc/README.md -o "$SITE/doc/index.html" \
            --standalone \
            --metadata title="Unicon documentation" \
            -t html5
          test -f CONTRIBUTING.md && test -f COPYING
          cp CONTRIBUTING.md COPYING "$SITE/"
          pandoc CONTRIBUTING.md -o "$SITE/CONTRIBUTING.html" \
            --standalone \
            --metadata title="Contributing to Unicon" \
            -t html5
          touch "$SITE/.nojekyll"

      - name: Upload site artifact (for deploy job)
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: _site
          retention-days: 3

  deploy:
    if: github.repository == 'uniconproject/unicon' && github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: site
          path: _site

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
